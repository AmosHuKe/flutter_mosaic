name: contributors
run-name: "Contributors"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  contrib-readme-job:
    if: github.repository == 'AmosHuKe/flutter_mosaic'
    permissions:
      contents: write
      pull-requests: write
    strategy:
      max-parallel: 1
      matrix:
        readme_path: [README.md, README-ZH.md]
    runs-on: ubuntu-latest
    name: A job to automate contrib in readme
    steps:
      - name: Contribute List - ${{ matrix.readme_path }}
        uses: akhilmhdh/contributors-readme-action@83ea0b4f1ac928fbfe88b9e8460a932a528eb79f
        with:
          image_size: 100
          readme_path: ${{ matrix.readme_path }}
          use_username: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
